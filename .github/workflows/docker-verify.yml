name: Verify Docker Builds

on:
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  verify-rust-services:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: embedding
            package: catest-embedding
          - service: gateway
            package: catest-gateway
          - service: ingestion
            package: catest-ingestion
          - service: parser
            package: catest-parser
          - service: review
            package: catest-review
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Rust Service (No Push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./rust.Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            SERVICE_NAME=${{ matrix.package }}

  verify-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Frontend (No Push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./web/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
