name: Kubernetes Manifest Validation

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Kubeconform
        uses: docker://ghcr.io/yannh/kubeconform:master
        with:
          args: "-strict -summary k8s/"
