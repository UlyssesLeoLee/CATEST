name: Rust CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev librdkafka-dev protobuf-compiler libsasl2-dev libzstd-dev
      - name: Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
      - name: Format Check
        run: cargo fmt --all -- --check
      - name: Clippy
        env:
          RDKAFKA_SYS_STATIC: 0
        run: cargo clippy --all-targets -- -D warnings
      - name: Upload Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: clippy-logs
          path: |
            target/debug/build/*/out/*.log
            target/debug/build/*/stderr
            target/debug/build/*/stdout

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev librdkafka-dev protobuf-compiler libsasl2-dev libzstd-dev
      - name: Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --verbose
      - name: Run tests
        env:
          RDKAFKA_SYS_STATIC: 0
        run: cargo test --all --verbose
