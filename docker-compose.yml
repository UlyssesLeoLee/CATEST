services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: catest
      POSTGRES_USER: ${POSTGRES_USER:-catest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "${POSTGRES_PORT:-35432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/create_databases.sh:/docker-entrypoint-initdb.d/00-create_databases.sh
      - ./scripts/initdb.d:/docker-entrypoint-initdb.d/
    networks:
      - catest-net

  adminer:
    image: adminer:latest
    restart: always
    ports:
      - "${ADMINER_PORT:-38080}:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=postgres
    networks:
      - catest-net

  kafka:
    image: apache/kafka:latest
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://:9092,EXTERNAL://:39092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:39092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 1
    ports:
      - "${KAFKA_PORT:-39092}:39092"

  neo4j:
    image: neo4j:community
    environment:
      NEO4J_AUTH: neo4j/password
    ports:
      - "${NEO4J_HTTP_PORT:-37474}:7474"
      - "${NEO4J_BOLT_PORT:-37687}:7687"
    volumes:
      - neo4j_data:/data

  qdrant:
    image: qdrant/qdrant
    environment:
      - QDRANT__SERVICE__API_KEY=${QDRANT_API_KEY:-password}
    ports:
      - "${QDRANT_HTTP_PORT:-36334}:6333" # HTTP
      - "${QDRANT_GRPC_PORT:-36333}:6334" # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage

  arroyo:
    image: ghcr.io/arroyosystems/arroyo:latest
    ports:
      - "${ARROYO_UI_PORT:-35115}:5115"
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-catest}:${POSTGRES_PASSWORD:-password}@postgres:5432/arroyo
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      - postgres
      - kafka

volumes:
  pgdata:
  neo4j_data:
  qdrant_storage:

networks:
  catest-net:
    driver: bridge
