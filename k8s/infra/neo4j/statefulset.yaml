apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: neo4j
  namespace: catest
spec:
  serviceName: neo4j
  replicas: 1
  selector:
    matchLabels:
      app: neo4j
  template:
    metadata:
      labels:
        app: neo4j
    spec:
      containers:
        - name: neo4j
          image: neo4j:community
          env:
            - name: NEO4J_AUTH
              value: "neo4j/password"
            - name: NEO4J_server_config_strict__validation_enabled
              value: "false"

          ports:
            - containerPort: 7474
              name: http
            - containerPort: 7687
              name: bolt
          volumeMounts:
            - name: neo4j-data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: neo4j-data
      spec:
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: 10Gi
