apiVersion: v1
kind: Service
metadata:
  name: postgres-ext
  namespace: catest
spec:
  type: LoadBalancer
  ports:
    - port: 34321
      targetPort: 34321
  selector:
    app: postgres
---
apiVersion: v1
kind: Service
metadata:
  name: qdrant-ext
  namespace: catest
spec:
  type: LoadBalancer
  ports:
    - port: 36334
      targetPort: 36334
      name: http
    - port: 36333
      targetPort: 36333
      name: grpc
  selector:
    app: qdrant
---
apiVersion: v1
