apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: catest-saas-route
  namespace: catest
spec:
  parentRefs:
    - name: catest-envoy-gateway
  rules:
    # ─────────────── App Routing / Frontends ─────────────────────────────
    - matches:
        - path: { type: PathPrefix, value: /workspace }
      backendRefs:
        - name: catest-web-workspace
          port: 33001
    - matches:
        - path: { type: PathPrefix, value: /rag }
      backendRefs:
        - name: catest-web-rag
          port: 33002
    - matches:
        - path: { type: PathPrefix, value: /review }
      backendRefs:
        - name: catest-web-review
          port: 33003
    - matches:
        - path: { type: PathPrefix, value: /team }
      backendRefs:
        - name: catest-web-team
          port: 33004
    - matches:
        - path: { type: PathPrefix, value: / }
      backendRefs:
        - name: catest-web-base
          port: 33000

    # ─────────────── API Routing / Backends ──────────────────────────────
    - matches:
        - path: { type: PathPrefix, value: /api/hub }
      filters:
        - type: URLRewrite
          urlRewrite: { path: { type: ReplacePrefixMatch, replacePrefixMatch: / } }
      backendRefs:
        - name: catest-hub
          port: 33080
    - matches:
        - path: { type: PathPrefix, value: /api/review }
      filters:
        - type: URLRewrite
          urlRewrite: { path: { type: ReplacePrefixMatch, replacePrefixMatch: / } }
      backendRefs:
        - name: catest-review
          port: 33081
    - matches:
        - path: { type: PathPrefix, value: /api/workspace }
      filters:
        - type: URLRewrite
          urlRewrite: { path: { type: ReplacePrefixMatch, replacePrefixMatch: / } }
      backendRefs:
        - name: catest-workspace
          port: 33082
    - matches:
        - path: { type: PathPrefix, value: /api/intelligence }
      filters:
        - type: URLRewrite
          urlRewrite: { path: { type: ReplacePrefixMatch, replacePrefixMatch: / } }
      backendRefs:
        - name: catest-intelligence
          port: 33083
