apiVersion: batch/v1
kind: CronJob
metadata:
  name: catest-mb-rebuild-nightly
  namespace: catest
spec:
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: mb-rebuild
              image: ghcr.io/ulyssesleolee/catest-batch:latest
              imagePullPolicy: IfNotPresent
              command: ["/app/service"]
              env:
                - name: BATCH_MODE
                  value: "worker"
                - name: DATABASE_URL
                  value: "postgres://catest:password@postgres:34321/catest_batch"
                - name: KAFKA_BROKER
                  value: "kafka:39092"
                - name: KAFKA_GROUP_ID
                  value: "catest-mb-rebuild-nightly"
                - name: BATCH_JOB_TYPE
                  value: "mb_rebuild"
              resources:
                limits:
                  cpu: "1000m"
                  memory: "1Gi"
                requests:
                  cpu: "200m"
                  memory: "256Mi"
          restartPolicy: OnFailure
