---
# web-review: Deployment + Service
# Port: 3003 -> LoadBalancer: 33003
# Maps to: catest-review backend service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catest-web-review
  namespace: catest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catest-web-review
  template:
    metadata:
      labels:
        app: catest-web-review
    spec:
      containers:
        - name: web-review
          image: ghcr.io/ulyssesleolee/catest-web-review:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3003
          envFrom:
            - secretRef:
                name: catest-app-secrets
          env:
            - name: NEXT_PUBLIC_SAAS_MODE
              value: "true"
            - name: NEXT_PUBLIC_GATEWAY_URL
              value: "http://catest-hub:33080"
            - name: NEXT_PUBLIC_REVIEW_URL
              value: "http://catest-review:33081"
---
apiVersion: v1
kind: Service
metadata:
  name: catest-web-review
  namespace: catest
spec:
  type: LoadBalancer
  ports:
    - port: 33003
      targetPort: 3003
  selector:
    app: catest-web-review
