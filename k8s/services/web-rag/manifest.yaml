---
# web-rag: Deployment + Service
# Port: 3002 -> LoadBalancer: 33002
# Maps to: catest-embedding (Qdrant + Neo4j)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catest-web-rag
  namespace: catest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catest-web-rag
  template:
    metadata:
      labels:
        app: catest-web-rag
    spec:
      containers:
        - name: web-rag
          image: ghcr.io/ulyssesleolee/catest-web-rag:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3002
          envFrom:
            - secretRef:
                name: catest-app-secrets
          env:
            - name: NEXT_PUBLIC_SAAS_MODE
              value: "true"
            - name: NEXT_PUBLIC_GATEWAY_URL
              value: "http://catest-intelligence:33083"
            - name: NEXT_PUBLIC_QDRANT_URL
              value: "http://qdrant:6333"
---
apiVersion: v1
kind: Service
metadata:
  name: catest-web-rag
  namespace: catest
spec:
  type: LoadBalancer
  ports:
    - port: 33002
      targetPort: 3002
  selector:
    app: catest-web-rag
